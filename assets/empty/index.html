<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categoría sin contenido</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    .empty-page {
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease-in-out;
    }

    .icon {
      font-size: 4rem;
      color: #dc3545;
      margin-bottom: 1rem;
    }

    .empty-page img {
      max-width: 300px;
      height: auto;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    h2 {
      color: #343a40;
      font-weight: bold;
    }

    p {
      color: #6c757d;
    }

    .btn-home {
      margin-top: 1.5rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="contenedor">  

  <div class="empty-page">
    <!-- Ícono de Font Awesome -->
    <div><i class="fas fa-circle-exclamation icon"></i></div>

    <!-- Imagen ilustrativa -->
    <img src="../../../../../../assets/empty/error.webp" alt="Sin contenido aún" loading="lazy">

    <h2>Ahora no hay nada por acá</h2>
    <p>Estamos trabajando para agregar contenido en esta sección. ¡Vuelve pronto!</p>

    <!-- Botón para volver al inicio -->
    <a class="btn btn-outline-primary btn-home" onclick="history.back()">
      <i class="fas fa-arrow-left me-2"></i> Volver</a>
  </div>
</div>
</body>
</html>
